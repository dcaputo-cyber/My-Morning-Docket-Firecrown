name: Morning Docket — Build on Script Push

on:
  push:
    paths:
      - "scripts/episodes/*.txt"
      - "generate_episode_audio.py"
      - "build_rss_feed.py"
      - ".github/workflows/daily-build.yml"
  schedule:
    - cron: "0 9 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-episode:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install edge-tts pydub mutagen

      - name: Compute today's date
        id: date
        run: echo "today=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Find today's script
        id: findscript
        run: |
          today_file="scripts/episodes/episode-${{ steps.date.outputs.today }}-script.txt"
          if [ -f "$today_file" ]; then
            echo "script=$today_file" >> "$GITHUB_OUTPUT"
          else
            latest=$(ls -t scripts/episodes/*.txt 2>/dev/null | head -n 1 || true)
            if [ -z "$latest" ]; then
              echo "No script found. Nothing to build."
              echo "script=" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Using latest script: $latest"
            echo "script=$latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if no script available
        if: steps.findscript.outputs.script == ''
        run: |
          echo "::notice::No script to build — skipping."
          exit 0

      - name: Derive episode date from script filename
        if: steps.findscript.outputs.script != ''
        id: episode
        run: |
          base=$(basename "${{ steps.findscript.outputs.script }}")
          date=$(echo "$base" | grep -oE "[0-9]{4}-[0-9]{2}-[0-9]{2}" | head -n 1)
          if [ -z "$date" ]; then date="${{ steps.date.outputs.today }}"; fi
          echo "date=$date" >> "$GITHUB_OUTPUT"

      - name: Generate MP3 with edge-tts (free)
        if: steps.findscript.outputs.script != ''
        run: |
          mkdir -p episodes
          python -u generate_episode_audio.py \
            --script "${{ steps.findscript.outputs.script }}" \
            --out "episodes/morning-docket-${{ steps.episode.outputs.date }}.mp3"

      - name: Verify MP3 exists
        if: steps.findscript.outputs.script != ''
        run: |
          ls -la episodes
          test -f "episodes/morning-docket-${{ steps.episode.outputs.date }}.mp3"

      - name: Rebuild podcast feed
        if: steps.findscript.outputs.script != ''
        run: |
          mkdir -p feed
          python build_rss_feed.py \
            --episodes-dir episodes \
            --feed-out feed/podcast.xml \
            --base-url "https://dcaputo-cyber.github.io/My-Morning-Docket-Firecrown/episodes"

      - name: Commit generated files
        if: steps.findscript.outputs.script != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add episodes/ feed/
          git status --short
          git commit -m "Build episode ${{ steps.episode.outputs.date }}" || echo "No changes to commit"
          git push
